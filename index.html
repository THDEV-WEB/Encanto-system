<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Encanto – Açaí & Marmitas</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://images.unsplash.com" crossorigin>
<link rel="dns-prefetch" href="https://hvbcdxsagkjtfjwvnslo.supabase.co">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<!-- ================================================================================================
     REF-BOOT-02 v2 — COLETOR FORENSE DO BOOTSTRAP (TEMPORARIO / DIAGNOSTICO).
     Script CLASSICO em ES5 PURO. Objetivo unico: registrar, de forma SINCRONA e PERSISTENTE, qual foi a
     ultima etapa executada antes de um travamento — INCLUSIVE quando a main thread bloqueia (caso em que
     nenhum watchdog assincrono conseguiria exibir nada). Por isso: cada checkpoint e gravado no localStorage
     NA HORA (sincrono), a execucao anterior e preservada (cur/prev) e revelada na PROXIMA carga (banner),
     e ha um heartbeat que congela junto com a main thread (dizendo QUANDO travou). NAO altera regra de
     negocio, build, Vite, Babel; nao adiciona polyfill; nao muda o fluxo de init. Remover apos o diagnostico.
     ================================================================================================ -->
<script>
/* eslint-disable */
(function () {
  'use strict';
  var LS_KEY = 'enc_boot_diag';
  var BUILD = 'boot02-v2';                 /* marcador de build: inspecao remota distingue HTML novo de cache */
  var t0 = (window.performance && performance.now) ? performance.now() : (+new Date());
  function ms() { return Math.round((window.performance && performance.now) ? (performance.now() - t0) : (+new Date() - t0)); }
  function iso() { try { return new Date().toISOString(); } catch (e) { return '' + new Date(); } }

  /* le a execucao ANTERIOR sem sobrescrever (persistencia entre execucoes) */
  var existing = null;
  try { existing = JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch (e) {}
  var prev = (existing && existing.cur) ? existing.cur : null;

  var B = {
    v: 3, build: BUILD, ref: 'REF-BOOT-02',
    runId: (prev && prev.runId ? prev.runId : 0) + 1,
    startedAt: iso(),
    steps: [], errors: [],
    mounted: false, firstPaint: false,
    hbT: 0, hbCount: 0,
    diagShown: false,
    ua: (navigator && navigator.userAgent) || ''
  };
  B.prev = prev;
  window.__ENC_BOOT__ = B;

  function snap(o) {
    if (!o) return null;
    return {
      v: o.v, build: o.build, runId: o.runId, startedAt: o.startedAt, ua: o.ua, feat: o.feat,
      steps: o.steps, errors: o.errors, mounted: o.mounted, firstPaint: o.firstPaint,
      hbT: o.hbT, hbCount: o.hbCount, diagShown: o.diagShown
    };
  }
  function persist() { try { localStorage.setItem(LS_KEY, JSON.stringify({ cur: snap(B), prev: snap(B.prev) })); } catch (e) {} }

  B.step = function (code, msg) {
    B.steps.push({ code: code, msg: msg || '', t: ms() });
    if (B.steps.length > 120) B.steps.shift();
    persist();
  };
  B.markMounted = function () { if (B.mounted) return; B.mounted = true; B.step('BOOT-140-committed', 'React fez o 1o commit'); };
  B.markFirstPaint = function () { if (B.firstPaint) return; B.firstPaint = true; B.step('BOOT-150-first-paint', 'primeira pintura (rAF pos-commit)'); };

  function pushErr(kind, message, extra) {
    extra = extra || {};
    B.errors.push({
      kind: kind, message: String(message == null ? '' : message),
      file: extra.file || '', line: extra.line || 0, col: extra.col || 0,
      stack: extra.stack ? String(extra.stack).slice(0, 1600) : '', t: ms()
    });
    if (B.errors.length > 30) B.errors.shift();
    persist();
    if (!B.mounted) setTimeout(maybeShowDiag, 1200);
  }

  /* captura global — capture:true pega falha de CARGA de recurso e tambem excecoes/parse do modulo */
  window.addEventListener('error', function (ev) {
    var tgt = ev && ev.target;
    if (tgt && tgt !== window && (tgt.tagName === 'SCRIPT' || tgt.tagName === 'LINK' || tgt.tagName === 'IMG')) {
      pushErr('recurso', tgt.tagName + ' falhou a carregar: ' + (tgt.src || tgt.href || '(sem url)'), {});
      return;
    }
    var err = ev && ev.error;
    pushErr('erro', (ev && ev.message) || (err && err.message) || 'erro desconhecido', {
      file: ev && ev.filename, line: ev && ev.lineno, col: ev && ev.colno, stack: err && err.stack
    });
  }, true);
  window.addEventListener('unhandledrejection', function (ev) {
    var r = ev && ev.reason;
    pushErr('promise', (r && r.message) || String(r == null ? 'promise rejeitada' : r), { stack: r && r.stack });
  });

  /* feature-detect: new Function faz PARSE sem executar o app; lanca SyntaxError onde a sintaxe nao existe */
  function canParse(src) { try { new Function(src); return true; } catch (e) { return false; } }
  function has(fn) { try { return !!fn(); } catch (e) { return false; } }
  B.feat = {
    esModule: has(function () { return 'noModule' in document.createElement('script'); }),
    optionalChaining: canParse('var o={a:{}};return o?.a?.b'),
    nullish: canParse('return null ?? 1'),
    arrow: canParse('return (()=>0)'),
    letConst: canParse('const x=1; let y=2; return x+y'),
    asyncAwait: canParse('return (async function(){})'),
    classFields: canParse('class C{ x=1 } return new C().x'),
    intlSaoPaulo: has(function () { new Intl.DateTimeFormat('en-US', { timeZone: 'America/Sao_Paulo' }); return true; }),
    messageChannel: (typeof MessageChannel !== 'undefined'),
    promise: (typeof Promise !== 'undefined'),
    fetch: (typeof fetch !== 'undefined'),
    localStorage: has(function () { localStorage.setItem('__enc_t', '1'); localStorage.removeItem('__enc_t'); return true; })
  };
  B.step('BOOT-000-inline', 'coletor ES5 v2 instalado (build ' + BUILD + ')');

  /* marca no loader que o COLETOR rodou (separa "HTML novo mas coletor nao rodou" de "tudo ok") */
  try { var tag = document.getElementById('enc-build'); if (tag) tag.textContent = BUILD + '·ok'; } catch (e) {}

  /* heartbeat: se a main thread bloquear, o ultimo hbT persistido diz QUANDO travou (vs. checkpoint) */
  try { setInterval(function () { B.hbT = ms(); B.hbCount++; persist(); }, 1000); } catch (e) {}

  /* ---------- relatorio (ES5) ---------- */
  function m1(re, s) { try { var r = re.exec(s || ''); return r && r[1] ? r[1] : ''; } catch (e) { return ''; } }
  function yn(b) { return b ? 'sim' : 'NAO'; }
  /* ultima etapa SIGNIFICATIVA: ignora o marcador sintetico BOOT-DIAG (a propria tela de diagnostico) p/ nao
     mascarar o ponto real de parada no veredicto/relatorio/banner — inclusive quando vem do prev. */
  function ultimoStep(o) {
    if (!o || !o.steps) return null;
    for (var i = o.steps.length - 1; i >= 0; i--) { if ((o.steps[i].code || '').indexOf('BOOT-DIAG') !== 0) return o.steps[i]; }
    return null;
  }
  function runReport(o, titulo) {
    if (!o) return titulo + ': (sem dados)\n';
    var last = ultimoStep(o);
    var L = [];
    L.push('== ' + titulo + ' (run #' + o.runId + ', build ' + (o.build || '?') + ') ==');
    L.push('quando: ' + o.startedAt);
    L.push('montou (1o commit): ' + yn(o.mounted) + ' | primeira pintura: ' + yn(o.firstPaint));
    L.push('ULTIMA ETAPA: ' + (last ? (last.code + ' "' + last.msg + '" @' + last.t + 'ms') : 'NENHUMA — nem o coletor registrou (bundle/coletor nao executou)'));
    L.push('heartbeat: ' + (o.hbCount || 0) + ' batidas, ultimo @' + (o.hbT || 0) + 'ms' + (last ? ('  (delta p/ ultima etapa: ' + ((o.hbT || 0) - last.t) + 'ms)') : ''));
    var seq = [];
    for (var i = 0; i < (o.steps ? o.steps.length : 0); i++) seq.push(o.steps[i].code + '@' + o.steps[i].t);
    L.push('sequencia: ' + (seq.join(' > ') || '(vazia)'));
    L.push('erros (' + (o.errors ? o.errors.length : 0) + '):');
    for (var j = 0; j < (o.errors ? o.errors.length : 0); j++) {
      var e = o.errors[j];
      L.push('  [' + (j + 1) + '] ' + e.kind + ': ' + e.message + (e.file ? ('  @' + e.file + ':' + e.line + ':' + e.col) : '') + ' @' + e.t + 'ms');
      if (e.stack) { var st = e.stack.split('\n'); for (var k = 0; k < st.length && k < 3; k++) L.push('      ' + st[k]); }
    }
    var f = o.feat || {};
    L.push('compat: ES-modules:' + yn(f.esModule) + ' | ?.:' + yn(f.optionalChaining) + ' | ??:' + yn(f.nullish) + ' | MessageChannel:' + yn(f.messageChannel) + ' | Intl-SP:' + yn(f.intlSaoPaulo) + ' | Promise:' + yn(f.promise) + ' | fetch:' + yn(f.fetch) + ' | localStorage:' + yn(f.localStorage));
    return L.join('\n');
  }
  function fullReport() {
    var L = [];
    L.push('ENCANTO — RELATORIO DE BOOT (REF-BOOT-02 v2)');
    L.push('navegador: ' + B.ua);
    L.push('  Chrome/WebView:' + (m1(/Chrom(?:e|ium)\/(\d+)/, B.ua) || '?') + ' | Android:' + (m1(/Android\s+([\d.]+)/, B.ua) || '?') + ' | in-app:' + ((/(FBAN|FBAV|Instagram|WhatsApp|Line|MiuiBrowser|MicroMessenger)/.test(B.ua)) ? m1(/(FBAN|FBAV|Instagram|WhatsApp|Line|MiuiBrowser|MicroMessenger)/, B.ua) : 'nao'));
    try { L.push('  tela:' + (window.screen ? (screen.width + 'x' + screen.height) : '?') + ' dpr' + (window.devicePixelRatio || 1)); } catch (e) {}
    L.push('');
    L.push(runReport(B, 'EXECUCAO ATUAL'));
    L.push('');
    L.push(runReport(B.prev, 'EXECUCAO ANTERIOR'));
    return L.join('\n');
  }
  function veredicto(o) {
    if (!o) return 'Sem dados da execucao.';
    var f = o.feat || {};
    if (!f.esModule) return 'Este navegador nao suporta modulos JavaScript (ES modules). O app nao inicia aqui.';
    if (!f.nullish) return 'Este navegador nao entende a sintaxe do app (nullish ??). Incompatibilidade de parse.';
    var last = ultimoStep(o);
    if (o.mounted) return 'O React montou; o travamento (se houver) e apos a montagem.';
    if (last && last.code.indexOf('BOOT-130') === 0) return 'render() foi chamado mas o React nunca fez commit — provavel starvation do agendador (scheduler) no WebView.';
    if (!last || last.code.indexOf('BOOT-000') === 0) return 'Nem o bundle chegou a executar (parou no coletor). Ver erros/feature-detect.';
    return 'Bootstrap interrompeu em: ' + (last ? last.code : '?') + '. Ver sequencia e heartbeat.';
  }

  function copiar(txt, btn) {
    function ok(b) { try { btn.textContent = b ? 'Copiado!' : 'Selecione o texto e copie'; } catch (e) {} }
    var ta = document.getElementById('enc-diag-ta');
    function fb() { try { if (ta) { ta.focus(); ta.select(); ok(!!(document.execCommand && document.execCommand('copy'))); return; } } catch (e) {} ok(false); }
    try { if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(txt).then(function () { ok(true); }, fb); return; } } catch (e) {}
    fb();
  }
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function showDiag() {
    if (B.diagShown) return;
    B.diagShown = true;
    B.step('BOOT-DIAG', 'tela de diagnostico exibida');
    var txt = fullReport();
    var box = document.createElement('div');
    box.setAttribute('id', 'enc-diag');
    box.setAttribute('style', 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:2147483647;background:#fff;color:#1f2937;font-family:sans-serif;padding:18px;overflow:auto;-webkit-overflow-scrolling:touch;');
    box.innerHTML =
      '<div style="max-width:720px;margin:0 auto;">' +
        '<div style="font-size:34px;line-height:1;margin-bottom:6px;">🧩</div>' +
        '<h1 style="font-size:19px;margin:0 0 6px;color:#6B21A8;">Diagnostico de inicializacao</h1>' +
        '<p style="font-size:13px;margin:0 0 4px;color:#374151;">' + esc(veredicto(B.prev && !B.prev.mounted ? B.prev : B)) + '</p>' +
        '<p style="font-size:12px;margin:0 0 8px;color:#6B7280;">Toque em <b>Copiar relatorio</b> e envie ao suporte.</p>' +
        '<textarea id="enc-diag-ta" readonly style="width:100%;height:250px;box-sizing:border-box;font-family:monospace;font-size:11px;line-height:1.35;color:#111827;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:10px;white-space:pre;">' + esc(txt) + '</textarea>' +
        '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">' +
          '<button id="enc-diag-copy" style="flex:1 1 auto;padding:12px 16px;border:none;border-radius:10px;background:#6B21A8;color:#fff;font-weight:700;font-size:14px;">Copiar relatorio</button>' +
          '<button id="enc-diag-reload" style="flex:1 1 auto;padding:12px 16px;border:1px solid #D1D5DB;border-radius:10px;background:#fff;color:#374151;font-weight:600;font-size:14px;">Recarregar</button>' +
        '</div>' +
      '</div>';
    var host = document.getElementById('root');
    try { if (host) host.innerHTML = ''; } catch (e) {}
    (document.body || document.documentElement).appendChild(box);
    var c = document.getElementById('enc-diag-copy'); if (c) c.onclick = function () { copiar(txt, c); };
    var r = document.getElementById('enc-diag-reload'); if (r) r.onclick = function () { try { window.location.reload(); } catch (e) {} };
    persist();
  }

  function appMontou() { if (B.mounted) return true; return !document.getElementById('enc-loader'); }
  function maybeShowDiag() { if (B.diagShown || appMontou()) return; showDiag(); }

  /* BANNER de recuperacao: se a execucao ANTERIOR nao montou, revela NA HORA (sem esperar 15s) */
  function mostrarBanner() {
    if (!(B.prev && B.prev.mounted === false)) return;
    var last = ultimoStep(B.prev);
    var bar = document.createElement('div');
    bar.setAttribute('style', 'position:fixed;top:0;left:0;right:0;z-index:2147483646;background:#6B21A8;color:#fff;font-family:sans-serif;font-size:12px;padding:9px 12px;display:flex;gap:10px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.25);');
    bar.innerHTML = '<span style="flex:1 1 auto;">Diagnostico: a inicializacao anterior parou em <b>' + esc(last ? last.code : 'inicio') + '</b>.</span>' +
      '<button id="enc-banner-ver" style="padding:6px 12px;border:none;border-radius:8px;background:#fff;color:#6B21A8;font-weight:700;font-size:12px;">Ver relatorio</button>';
    (document.body || document.documentElement).appendChild(bar);
    var v = document.getElementById('enc-banner-ver'); if (v) v.onclick = function () { showDiag(); };
  }
  try {
    if (document.body) mostrarBanner();
    else window.addEventListener('DOMContentLoaded', mostrarBanner);
  } catch (e) {}

  /* gatilho manual: #enc-diag mostra o relatorio completo (atual + anterior) */
  try { if (window.location && window.location.hash === '#enc-diag') setTimeout(showDiag, 50); } catch (e) {}

  /* watchdog de fallback (execucao ATUAL viva mas nunca monta): 15s. Um mount tardio cancela via appMontou. */
  setTimeout(maybeShowDiag, 15000);
})();
</script>
<div id="root">
  <div id="enc-loader" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:10px;font-family:sans-serif;color:#6B21A8">
    <div style="width:40px;height:40px;border:4px solid #E9D5FF;border-top-color:#6B21A8;border-radius:50%;animation:s .8s linear infinite"></div>
    <span>Carregando Encanto...</span>
    <span id="enc-build" style="font-size:9px;opacity:.3;letter-spacing:.5px">boot02-v2</span>
    <style>@keyframes s{to{transform:rotate(360deg)}}</style>
  </div>
</div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
